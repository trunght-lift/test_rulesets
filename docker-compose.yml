services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:latest
    container_name: openhands
    restart: unless-stopped
    environment:
      # Override với env vars khi chạy docker exec
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-4o-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      AGENT_SERVER_IMAGE_REPOSITORY: ghcr.io/openhands/agent-server
      LOG_ALL_EVENTS: "true"
    volumes:
      # macOS Docker Desktop socket path
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/root/.openhands
      # Mount workspace để agent có thể đọc file nếu cần
      - .:/workspace:ro
    # Giữ container sống bằng tail -f /dev/null
    # (không chạy server, chỉ dùng docker exec để gọi CLI headless)
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  openhands-state:
