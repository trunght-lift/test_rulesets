name: Test Check

on:
  push:
    branches:
      - main
      - develop
      - "**"
  pull_request:

jobs:
  demo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Print message
        run: echo "GitHub check is running"

      - name: Simulate fail
        run: |
          echo "This check will fail now"
          exit 1